<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>בחירת מלונות - פרימיום ריטריטס</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  
  <script>
    (function (s, t, a, y, twenty, two) {
      s.Stay22 = s.Stay22 || {};
      s.Stay22.params = { lmaID: '69d4fe25e9e6102453a4f8cf' };
      twenty = t.createElement(a);
      two = t.getElementsByTagName(a)[0];
      twenty.async = 1;
      twenty.src = y;
      two.parentNode.insertBefore(twenty, two);
    })(window, document, 'script', 'https://scripts.stay22.com/letmeallez.js');
  </script>


  <style>
    :root {
      --cream: #f6f2ec;
      --cream2: #ede7dd;
      --cream3: #d8cfc2;
      --teal: #26796c;
      --teal2: #1a5a50;
      --tlt: #e6f3f1;
      --ink: #1a1714;
      --ink2: #3c3830;
      --ink3: #6a6258;
      --gold: #c4a270;
      --sh: 0 4px 20px rgba(26,23,20,.06);
      --sh2: 0 8px 30px rgba(26,23,20,.12);
    }
    
    * { box-sizing: border-box; font-family: "Heebo", sans-serif; }
    body { margin: 0; padding: 0; background: var(--cream); color: var(--ink); display: flex; height: 100vh; overflow: hidden; }
    
    /* Layout */
   .sidebar { width: 50%; display: flex; flex-direction: column; background: var(--cream); box-shadow: 10px 0 30px rgba(0,0,0,0.05); z-index: 10; }
   .map-panel { width: 50%; position: relative; z-index: 1; background: #e5e3df; }
    #map-container { width: 100%; height: 100%; }

    /* Topbar & Header */
   .topbar { padding: 30px 40px 20px; flex-shrink: 0; }
   .breadcrumbs { font-size: 13px; font-weight: 700; color: var(--teal); letter-spacing: 1px; margin-bottom: 10px; text-transform: uppercase; }
   .breadcrumbs span { color: var(--ink3); margin: 0 5px; }
   .page-title { font-size: 34px; font-weight: 900; margin: 0 0 5px 0; color: var(--ink); }
   .page-subtitle { font-size: 16px; font-weight: 500; color: var(--ink2); margin: 0; }

    /* Tabs */
   .tabs-container { padding: 0 40px; display: flex; gap: 10px; margin-top: 20px; border-bottom: 2px solid var(--cream2); flex-shrink: 0; overflow-x: auto;}
   .tab { background: none; border: none; padding: 12px 24px; font-family: "Heebo"; font-size: 16px; font-weight: 800; color: var(--ink3); cursor: pointer; border-bottom: 3px solid transparent; transition: 0.2s; white-space: nowrap;}
   .tab:hover { color: var(--ink); }
   .tab.active { color: var(--teal); border-bottom-color: var(--teal); }

    /* Filters */
   .filters { padding: 20px 40px; display: flex; gap: 10px; flex-shrink: 0; overflow-x: auto; }
   .filter-pill { background: var(--cream2); color: var(--ink2); padding: 8px 16px; border-radius: 99px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; border: none; font-family: "Heebo"; white-space: nowrap;}
   .filter-pill:hover { background: var(--cream3); }
   .filter-pill.active { background: var(--teal); color: white; }

    /* Hotel List */
   .hotel-list { flex: 1; overflow-y: auto; padding: 10px 40px 40px; }
    
    /* Hotel Card */
   .card { background: #fff; border-radius: 20px; margin-bottom: 25px; box-shadow: var(--sh); overflow: hidden; transition: 0.3s; border: 2px solid transparent; display: flex; flex-direction: column; }
   .card:hover { transform: translateY(-4px); box-shadow: var(--sh2); border-color: rgba(38,121,108,0.2); }
    
   .card-img { position: relative; height: 240px; }
   .card-img img { width: 100%; height: 100%; object-fit: cover; }
   .badge { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.95); padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 800; color: var(--ink); box-shadow: var(--sh); }
   .badge.non-ref { background: rgba(26,23,20,0.8); color: white; }
   
   .wishlist-btn { position: absolute; top: 16px; left: 16px; width: 40px; height: 40px; border-radius: 50%; background: rgba(26,23,20,0.4); border: none; color: white; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); transition: 0.2s; }
   .wishlist-btn:hover { background: rgba(26,23,20,0.6); transform: scale(1.05); }
   .wishlist-btn.saved { background: #e53935; color: white; }

   .card-body { padding: 24px; }
   .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
   .card-title-area { flex: 1; padding-left: 15px; }
   .stars { color: var(--gold); font-size: 14px; letter-spacing: 2px; margin-bottom: 8px; }
   .card-title { font-size: 22px; font-weight: 900; margin: 0 0 4px 0; color: var(--ink); line-height: 1.2; }
   .card-location { font-size: 14px; color: var(--ink3); font-weight: 500; }
    
   .card-price-area { text-align: left; }
   .price { font-size: 28px; font-weight: 900; color: var(--teal); line-height: 1; }
   .per-night { font-size: 13px; color: var(--ink3); font-weight: 500; margin-top: 4px; }

   .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--cream2); padding-top: 20px; }
   .rating-wrap { display: flex; align-items: center; gap: 12px; }
   .score { background: var(--teal); color: white; padding: 6px 10px; border-radius: 8px; font-weight: 900; font-size: 15px; }
   .rating-text { font-size: 14px; font-weight: 700; color: var(--ink); }
   .rating-text span { font-weight: 500; color: var(--ink3); margin-right: 5px; }
    
   .book-link { color: var(--teal); font-weight: 800; font-size: 15px; text-decoration: none; display: flex; align-items: center; gap: 5px; transition: 0.2s; cursor: pointer;}
   .book-link:hover { color: var(--teal2); }

    /* Map Markers */
   .leaflet-div-icon { background: transparent; border: none; }
   .price-marker { background: #fff; color: var(--ink); font-weight: 900; font-size: 14px; padding: 8px 14px; border-radius: 20px; text-align: center; box-shadow: var(--sh2); border: 2px solid transparent; position: relative; transition: 0.2s; }
   .price-marker::after { content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); border-width: 6px 6px 0; border-style: solid; border-color: #fff transparent transparent transparent; transition: 0.2s; }
   .price-marker.active,.price-marker:hover { background: var(--teal); color: #fff; border-color: #fff; transform: scale(1.1); z-index: 1000; }
   .price-marker.active::after,.price-marker:hover::after { border-color: var(--teal) transparent transparent transparent; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px;}
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--cream3); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--ink3); }

    /* Wishlist Floating Button */
    .wishlist-floating {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--ink);
      color: white;
      padding: 15px 25px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 800;
      box-shadow: var(--sh2);
      cursor: pointer;
      display: none;
      align-items: center;
      gap: 10px;
      z-index: 2000;
      transition: 0.3s;
      border: 2px solid rgba(255,255,255,0.1);
      font-family: "Heebo";
    }
    .wishlist-floating:hover {
      background: var(--ink2);
      transform: translateY(-3px);
    }
    .wishlist-count {
      background: #e53935;
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }

    @media (max-width: 768px) {
      body { flex-direction: column-reverse; overflow: auto; height: auto;}
      .sidebar { width: 100%; box-shadow: none; overflow: visible;}
      .map-panel { width: 100%; height: 40vh; }
      .topbar, .tabs-container, .filters, .hotel-list { padding-left: 20px; padding-right: 20px; }
      .wishlist-floating { bottom: 20px; right: 20px; padding: 12px 20px; font-size: 14px;}
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="topbar">
      <div class="breadcrumbs">יעדים <span>›</span> פרימיום ריטריטס</div>
      <h1 class="page-title">מלונות נבחרים</h1>
      <p class="page-subtitle" id="dynamic-subtitle">טוען נתונים...</p>
    </div>

    <div class="tabs-container" id="tabs-container"></div>

    <div class="filters">
      <button class="filter-pill active">הכי זול תחילה</button>
      <button class="filter-pill">ביטול בחינם</button>
      <button class="filter-pill">דירוג 8.5+</button>
      <button class="filter-pill">מתאים לילדים</button>
    </div>

    <div class="hotel-list" id="hotel-list">
    </div>
  </div>

  <div class="map-panel">
    <div id="map-container"></div>
  </div>

  <button class="wishlist-floating" id="wishlist-floating" onclick="sendWishlist()">
    <span>שלח לי את המלונות</span>
    <div class="wishlist-count" id="wishlist-count">0</div>
    <span>🏨</span>
  </button>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const destinations = {{ destinations | tojson }};
    const currentGroupType = "{{ group_type }}";
    const currentTravelStyle = "{{ travel_style }}";

    const mapLocations = {
      'khaoyai': { name: 'קאו יאי', center: [14.5300, 101.4000], zoom: 12 },
      'khaosok': { name: 'קאו סוק', center: [8.9100, 98.5250], zoom: 13 },
      'rome': { name: 'רומא', center: [41.9028, 12.4964], zoom: 13 },
      'tuscany': { name: 'טוסקנה', center: [43.7711, 11.2486], zoom: 10 }
    };

    let map;
    let markersArray = [];
    
    // שליפה של רשימת המשאלות מהזיכרון המקומי
    let wishlist = JSON.parse(localStorage.getItem('my_hotel_wishlist')) || [];

    function initMap() {
      map = L.map('map-container', { zoomControl: false });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CARTO'
      }).addTo(map);
      L.control.zoom({ position: 'bottomright' }).addTo(map);
      
      buildTabs();
      updateWishlistUI();

      if (destinations.length > 0) {
        switchRegion(destinations[0]);
      }
    }

    function buildTabs() {
      const container = document.getElementById('tabs-container');
      container.innerHTML = ''; 

      destinations.forEach((destKey, index) => {
        const btn = document.createElement('button');
        btn.className = index === 0 ? 'tab active' : 'tab';
        btn.id = 'tab-' + destKey;
        btn.innerText = mapLocations[destKey] ? mapLocations[destKey].name : destKey;
        btn.onclick = () => switchRegion(destKey);
        container.appendChild(btn);
      });
    }

    function switchRegion(destKey) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      const activeTab = document.getElementById('tab-' + destKey);
      if (activeTab) activeTab.classList.add('active');

      loadHotelsForDestination(destKey);
      updatePageTitles(destKey);
    }

    async function loadHotelsForDestination(destKey) {
      const regionData = mapLocations[destKey] || { center: [0, 0], zoom: 2, name: destKey };
      
      map.setView(regionData.center, regionData.zoom);
      
      markersArray.forEach(m => map.removeLayer(m.marker));
      markersArray = [];
      
      const listEl = document.getElementById('hotel-list');
      listEl.innerHTML = '<p style="text-align:center; margin-top:40px; color:var(--ink3);">מחפש מלונות אמיתיים בזמן אמת...</p>';
      
      try {
        const response = await fetch(`/api/hotels?lat=${regionData.center[0]}&lng=${regionData.center[1]}`);
        const data = await response.json();
        
        if (data.error || !data.results || data.results.length === 0) {
          throw new Error('לא נמצאו מלונות תואמים ביעד זה כרגע. בדקו שוב מאוחר יותר.');
        }

        listEl.innerHTML = '';
        
        // יצירת הכרטיסיות מתוך נתוני ה-API
        data.results.forEach(hotel => {
          // משיכת נתונים בטוחה (גם אם משהו חסר מה-API)
          const hPrice = hotel.price || (hotel.rate && hotel.rate.amount) || '---';
          const hName = hotel.name || 'מלון נבחר';
          const hImg = (hotel.images && hotel.images.length > 0) ? hotel.images[0] : 'https://images.unsplash.com/photo-1566073171639-4d8ef1090117?auto=format&fit=crop&w=800&q=80';
          const hRating = hotel.rating || hotel.guest_rating || '8.5';
          const hStars = hotel.star_rating || hotel.stars || 4;
          const hLat = hotel.location ? hotel.location.lat : hotel.lat;
          const hLng = hotel.location ? hotel.location.lng : hotel.lng;
          const hLink = hotel.url || '#';

          // בדיקה האם המלון כבר שמור כדי לצבוע את הלב
          const isSaved = wishlist.some(item => item.id === String(hotel.id));
          const heartClass = isSaved ? 'saved' : '';
          const heartChar = isSaved ? '♥' : '♡';

          // הכנת מחרוזות בטוחות ל-HTML
          const safeName = hName.replace(/'/g, "&apos;").replace(/"/g, "&quot;");
          const safeImg = hImg.replace(/'/g, "&apos;").replace(/"/g, "&quot;");
          const safeLink = hLink.replace(/'/g, "&apos;").replace(/"/g, "&quot;");

          const icon = L.divIcon({
            className: 'custom-div-icon',
            html: `<div class="price-marker" id="marker-${hotel.id}">₪${hPrice}</div>`,
            iconAnchor: [1, 2]
          });
          
          if(hLat && hLng) {
            const marker = L.marker([hLat, hLng], {icon: icon}).addTo(map);
            markersArray.push({ id: hotel.id, marker: marker });
          }

          const cardHtml = `
            <div class="card" onmouseenter="highlightMarker('${hotel.id}')" onmouseleave="resetMarkers()">
              <div class="card-img">
                <img src="${hImg}" alt="${hName}">
                <div class="badge">זמין להזמנה</div>
                <button class="wishlist-btn ${heartClass}" onclick="toggleWishlist(this, '${hotel.id}', '${safeName}', '${safeImg}', '${hPrice}', '${safeLink}')">${heartChar}</button>
              </div>
              <div class="card-body">
                <div class="card-header">
                  <div class="card-title-area">
                    <div class="stars">${'★'.repeat(hStars)}</div>
                    <h3 class="card-title">${hName}</h3>
                  </div>
                  <div class="card-price-area">
                    <div class="price">₪${hPrice}</div>
                    <div class="per-night">ללילה</div>
                  </div>
                </div>
                <div class="card-footer">
                  <div class="rating-wrap">
                    <div class="score">${hRating}</div>
                    <div class="rating-text">דירוג גולשים</div>
                  </div>
                  <a href="${hLink}" target="_blank" class="book-link">הזמן עכשיו ←</a>
                </div>
              </div>
            </div>
          `;
          listEl.innerHTML += cardHtml;
        });

      } catch (err) {
        console.error(err);
        listEl.innerHTML = `<p style="text-align:center; margin-top:40px; color:var(--ink3);">${err.message}</p>`;
      }
    }

    function updatePageTitles(destKey) {
      const titleEl = document.querySelector('.page-title');
      const subtitleEl = document.getElementById('dynamic-subtitle');
      let groupText = currentGroupType === 'couple' ? 'זוגות' : 'משפחות';
      titleEl.innerText = `מלונות נבחרים ל${groupText}`;
      const destName = mapLocations[destKey] ? mapLocations[destKey].name : destKey;
      subtitleEl.innerText = `${destName} • מותאם אישית`;
    }

    function highlightMarker(hotelId) {
      resetMarkers();
      const markerEl = document.getElementById('marker-' + hotelId);
      if(markerEl) markerEl.classList.add('active');
    }

    function resetMarkers() {
      document.querySelectorAll('.price-marker').forEach(el => el.classList.remove('active'));
    }

    // פונקציית Wishlist
    function toggleWishlist(btn, id, name, img, price, link) {
      const index = wishlist.findIndex(item => item.id === id);
      
      if (index === -1) {
        // הוספה לרשימה
        wishlist.push({ id, name, img, price, link });
        btn.classList.add('saved');
        btn.innerHTML = '♥';
      } else {
        // הסרה מהרשימה
        wishlist.splice(index, 1);
        btn.classList.remove('saved');
        btn.innerHTML = '♡';
      }
      
      // שמירה בדפדפן
      localStorage.setItem('my_hotel_wishlist', JSON.stringify(wishlist));
      updateWishlistUI();
    }

    function updateWishlistUI() {
      const floatingBtn = document.getElementById('wishlist-floating');
      const countEl = document.getElementById('wishlist-count');
      
      if (wishlist.length > 0) {
        floatingBtn.style.display = 'flex';
        countEl.innerText = wishlist.length;
      } else {
        floatingBtn.style.display = 'none';
      }
    }

    // שליחת הרשימה למייל דרך Webhook
    async function sendWishlist() {
      const email = prompt("לאיזה מייל תרצו שנשלח את המלונות ששמרתם?");
      if (!email) return;

      const btn = document.getElementById('wishlist-floating');
      const originalText = btn.innerHTML;
      btn.innerHTML = "שולח... ⏳";

      try {
        // ה-Webhook שלך מ-Make.com 
        const webhookUrl = "https://hook.eu1.make.com/k0qsisr1o4wtbkelc537zuej93y2glyy"; 
        
        await fetch(webhookUrl, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            event_type: "hotel_wishlist",
            userEmail: email,
            saved_hotels: wishlist
          })
        });
        
        alert("רשימת המלונות ששמרת נשלחה בהצלחה למייל שלך! ✈️");
      } catch (e) {
        alert("הייתה בעיה בשליחה, אנא ודאו את החיבור לאינטרנט ונסו שוב.");
      } finally {
        btn.innerHTML = originalText;
      }
    }

    window.onload = initMap;
  </script>
</body>
</html>
