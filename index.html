<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>בחירת מלונות - תאילנד למשפחות</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <style>
    :root {
      --cream: #f6f2ec;
      --cream2: #ede7dd;
      --cream3: #d8cfc2;
      --teal: #26796c;
      --teal2: #1a5a50;
      --tlt: #e6f3f1;
      --ink: #1a1714;
      --ink2: #3c3830;
      --ink3: #6a6258;
      --gold: #c4a270;
      --sh: 0 4px 20px rgba(26,23,20,.06);
      --sh2: 0 8px 30px rgba(26,23,20,.12);
    }
    
    * { box-sizing: border-box; font-family: "Heebo", sans-serif; }
    body { margin: 0; padding: 0; background: var(--cream); color: var(--ink); display: flex; height: 100vh; overflow: hidden; }
    
    /* Layout */
   .sidebar { width: 50%; display: flex; flex-direction: column; background: var(--cream); box-shadow: 10px 0 30px rgba(0,0,0,0.05); z-index: 10; }
   .map-panel { width: 50%; position: relative; z-index: 1; background: #e5e3df; }
    #map-container { width: 100%; height: 100%; }

    /* Topbar & Header */
   .topbar { padding: 30px 40px 20px; flex-shrink: 0; }
   .breadcrumbs { font-size: 13px; font-weight: 700; color: var(--teal); letter-spacing: 1px; margin-bottom: 10px; text-transform: uppercase; }
   .breadcrumbs span { color: var(--ink3); margin: 0 5px; }
   .page-title { font-size: 34px; font-weight: 900; margin: 0 0 5px 0; color: var(--ink); }
   .page-subtitle { font-size: 16px; font-weight: 500; color: var(--ink2); margin: 0; }

    /* Tabs */
   .tabs-container { padding: 0 40px; display: flex; gap: 10px; margin-top: 20px; border-bottom: 2px solid var(--cream2); flex-shrink: 0; }
   .tab { background: none; border: none; padding: 12px 24px; font-family: "Heebo"; font-size: 16px; font-weight: 800; color: var(--ink3); cursor: pointer; border-bottom: 3px solid transparent; transition: 0.2s; }
   .tab:hover { color: var(--ink); }
   .tab.active { color: var(--teal); border-bottom-color: var(--teal); }

    /* Filters */
   .filters { padding: 20px 40px; display: flex; gap: 10px; flex-shrink: 0; overflow-x: auto; }
   .filter-pill { background: var(--cream2); color: var(--ink2); padding: 8px 16px; border-radius: 99px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; border: none; font-family: "Heebo"; }
   .filter-pill:hover { background: var(--cream3); }
   .filter-pill.active { background: var(--teal); color: white; }

    /* Hotel List */
   .hotel-list { flex: 1; overflow-y: auto; padding: 10px 40px 40px; }
    
    /* Hotel Card */
   .card { background: #fff; border-radius: 20px; margin-bottom: 25px; box-shadow: var(--sh); overflow: hidden; transition: 0.3s; border: 2px solid transparent; display: flex; flex-direction: column; }
   .card:hover { transform: translateY(-4px); box-shadow: var(--sh2); border-color: rgba(38,121,108,0.2); }
    
   .card-img { position: relative; height: 240px; }
   .card-img img { width: 100%; height: 100%; object-fit: cover; }
   .badge { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.95); padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 800; color: var(--ink); box-shadow: var(--sh); }
   .badge.non-ref { background: rgba(26,23,20,0.8); color: white; }
   .wishlist-btn { position: absolute; top: 16px; left: 16px; width: 40px; height: 40px; border-radius: 50%; background: rgba(26,23,20,0.4); border: none; color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); transition: 0.2s; }
   .wishlist-btn:hover { background: rgba(26,23,20,0.6); transform: scale(1.05); }
   .wishlist-btn.saved { background: var(--teal); color: white; }

   .card-body { padding: 24px; }
   .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
   .card-title-area { flex: 1; padding-left: 15px; }
   .stars { color: var(--gold); font-size: 14px; letter-spacing: 2px; margin-bottom: 8px; }
   .card-title { font-size: 22px; font-weight: 900; margin: 0 0 4px 0; color: var(--ink); line-height: 1.2; }
   .card-location { font-size: 14px; color: var(--ink3); font-weight: 500; }
    
   .card-price-area { text-align: left; }
   .price { font-size: 28px; font-weight: 900; color: var(--teal); line-height: 1; }
   .per-night { font-size: 13px; color: var(--ink3); font-weight: 500; margin-top: 4px; }

   .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--cream2); padding-top: 20px; }
   .rating-wrap { display: flex; align-items: center; gap: 12px; }
   .score { background: var(--teal); color: white; padding: 6px 10px; border-radius: 8px; font-weight: 900; font-size: 15px; }
   .rating-text { font-size: 14px; font-weight: 700; color: var(--ink); }
   .rating-text span { font-weight: 500; color: var(--ink3); margin-right: 5px; }
    
   .book-link { color: var(--teal); font-weight: 800; font-size: 15px; text-decoration: none; display: flex; align-items: center; gap: 5px; transition: 0.2s; cursor: pointer;}
   .book-link:hover { color: var(--teal2); }

    /* Map Markers */
   .leaflet-div-icon { background: transparent; border: none; }
   .price-marker { background: #fff; color: var(--ink); font-weight: 900; font-size: 14px; padding: 8px 14px; border-radius: 20px; text-align: center; box-shadow: var(--sh2); border: 2px solid transparent; position: relative; transition: 0.2s; }
   .price-marker::after { content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); border-width: 6px 6px 0; border-style: solid; border-color: #fff transparent transparent transparent; transition: 0.2s; }
   .price-marker.active,.price-marker:hover { background: var(--teal); color: #fff; border-color: #fff; transform: scale(1.1); z-index: 1000; }
   .price-marker.active::after,.price-marker:hover::after { border-color: var(--teal) transparent transparent transparent; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--cream3); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--ink3); }

  </style>
</head>
<body>

  <div class="sidebar">
    <div class="topbar">
      <div class="breadcrumbs">תאילנד <span>›</span> פרימיום ריטריטס</div>
      <h1 class="page-title">מלונות נבחרים למשפחות</h1>
      <p class="page-subtitle">אוגוסט • זוג + 2 ילדים • תקציב בינוני-נמוך</p>
    </div>

    <div class="tabs-container">
      <button class="tab active" id="tab-khaoyai" onclick="switchRegion('khaoyai')">קאו יאי</button>
      <button class="tab" id="tab-khaosok" onclick="switchRegion('khaosok')">קאו סוק</button>
    </div>

    <div class="filters">
      <button class="filter-pill active">הכי זול תחילה</button>
      <button class="filter-pill">ביטול בחינם</button>
      <button class="filter-pill">דירוג 8.5+</button>
      <button class="filter-pill">מתאים לילדים</button>
    </div>

    <div class="hotel-list" id="hotel-list">
    </div>
  </div>

  <div class="map-panel">
    <div id="map-container"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // הנתונים המלאים של המלונות עם נתוני דמה
    const regionsData = {
      'khaoyai': {
        center: [14.5300, 101.4000],
        zoom: 12,
        hotels: [
          {
            id: 'ky1',
            lat: 14.5350,
            lng: 101.4050,
            price: 450,
            freeCancel: true,
            stars: 4,
            img: 'https://images.unsplash.com/photo-1566073171639-4d8ef1090117?auto=format&fit=crop&w=800&q=80',
            name: 'ריזורט טבע קאו יאי (Khao Yai Nature Resort)',
            locRating: '9.2',
            rating: '8.8'
          },
          {
            id: 'ky2',
            lat: 14.5200,
            lng: 101.3900,
            price: 320,
            freeCancel: false,
            stars: 3,
            img: 'https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?auto=format&fit=crop&w=800&q=80',
            name: 'בקתות היער הכחול (Blue Forest Cabins)',
            locRating: '8.5',
            rating: '8.2'
          },
          {
            id: 'ky3',
            lat: 14.5450,
            lng: 101.4200,
            price: 680,
            freeCancel: true,
            stars: 5,
            img: 'https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?auto=format&fit=crop&w=800&q=80',
            name: 'אחוזת הפאר קאו יאי (The Grand Estate)',
            locRating: '9.8',
            rating: '9.4'
          }
        ]
      },
      'khaosok': {
        center: [8.9100, 98.5250],
        zoom: 13,
        hotels: [
          {
            id: 'ks1',
            lat: 8.9150,
            lng: 98.5300,
            price: 550,
            freeCancel: true,
            stars: 5,
            img: 'https://images.unsplash.com/photo-1499793983690-e29da59ef1c2?auto=format&fit=crop&w=800&q=80',
            name: 'קאו סוק אקו לודג\' (Khao Sok Eco Lodge)',
            locRating: '9.5',
            rating: '9.2'
          },
          {
            id: 'ks2',
            lat: 8.9050,
            lng: 98.5200,
            price: 280,
            freeCancel: true,
            stars: 3,
            img: 'https://images.unsplash.com/photo-1542314831-c53cd4185af1?auto=format&fit=crop&w=800&q=80',
            name: 'בונגלוס על האגם (Lakefront Bungalows)',
            locRating: '9.8',
            rating: '8.9'
          }
        ]
      }
    };

    let map;
    let markersArray = []; // תוקן למערך ריק במקום הצהרה ריקה

    function initMap() {
      map = L.map('map-container', { zoomControl: false });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CARTO'
      }).addTo(map);
      L.control.zoom({ position: 'bottomright' }).addTo(map);
      switchRegion('khaoyai');
    }

    function switchRegion(regionKey) {
      const region = regionsData[regionKey];
      
      // עדכון טאבים
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + regionKey).classList.add('active');
      
      // עדכון מפה
      map.setView(region.center, region.zoom);
      
      // ניקוי סמנים ורשימה קודמת
      markersArray.forEach(m => map.removeLayer(m.marker));
      markersArray = []; // תוקן למערך ריק
      
      const listEl = document.getElementById('hotel-list');
      listEl.innerHTML = '';

      // רינדור מחדש של המלונות
      region.hotels.forEach(hotel => {
        // הוספת סמן למפה
        const icon = L.divIcon({
          className: 'custom-div-icon',
          html: `<div class="price-marker" id="marker-${hotel.id}">₪${hotel.price}</div>`,
          iconAnchor: [1, 2]
        });
        const marker = L.marker([hotel.lat, hotel.lng], {icon: icon}).addTo(map);
        markersArray.push({ id: hotel.id, marker: marker });

        // בניית כרטיסיית HTML
        const cancelBadge = hotel.freeCancel ? 
          `<div class="badge">ביטול בחינם</div>` : 
          `<div class="badge non-ref">ללא אפשרות החזר</div>`;

        const starsHtml = '★'.repeat(hotel.stars);

        const cardHtml = `
          <div class="card" onmouseenter="highlightMarker('${hotel.id}')" onmouseleave="resetMarkers()">
            <div class="card-img">
              <img src="${hotel.img}" alt="${hotel.name}">
              ${cancelBadge}
              <button class="wishlist-btn" onclick="toggleWishlist(this, '${hotel.name}')">♡</button>
            </div>
            <div class="card-body">
              <div class="card-header">
                <div class="card-title-area">
                  <div class="stars">${starsHtml}</div>
                  <h3 class="card-title">${hotel.name}</h3>
                  <div class="card-location">דירוג מיקום: ${hotel.locRating}</div>
                </div>
                <div class="card-price-area">
                  <div class="price">₪${hotel.price}</div>
                  <div class="per-night">ללילה</div>
                </div>
              </div>
              <div class="card-footer">
                <div class="rating-wrap">
                  <div class="score">${hotel.rating}</div>
                  <div class="rating-text">דירוג כללי <span>(מבוסס על ביקורות)</span></div>
                </div>
                <div class="book-link" onclick="window.open('https://www.booking.com/searchresults.html?ss=${encodeURIComponent(hotel.name)}', '_blank')">צפה ב-Booking.com ←</div>
              </div>
            </div>
          </div>
        `;
        listEl.innerHTML += cardHtml;
      });
    }

    // הדגשת סמן במפה בעת ריחוף על כרטיסיה
    function highlightMarker(hotelId) {
      resetMarkers();
      const markerEl = document.getElementById('marker-' + hotelId);
      if(markerEl) markerEl.classList.add('active');
    }

    function resetMarkers() {
      document.querySelectorAll('.price-marker').forEach(el => el.classList.remove('active'));
    }

    // פונקציית שמירה ל-Wishlist
    function toggleWishlist(btn, hotelName) {
      btn.classList.toggle('saved');
      if(btn.classList.contains('saved')) {
        btn.innerHTML = '♥';
        console.log(`[לחיבור עתידי] המלון ${hotelName} נשמר.`);
      } else {
        btn.innerHTML = '♡';
        console.log(`[לחיבור עתידי] המלון ${hotelName} הוסר.`);
      }
    }

    // טעינת המפה בסיום טעינת העמוד
    window.onload = initMap;
  </script>
</body>
</html>
